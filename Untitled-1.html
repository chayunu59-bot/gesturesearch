<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestureSearch – 제스처 기반 웹 검색</title>
  <!-- 스타일 연동 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>GestureSearch</h1>
    <p>손 제스처로 검색하는 비접촉 웹 서비스</p>
  </header>

  <main>
    <section id="camera-section">
      <video id="webcam" autoplay playsinline></video>
      <div id="guide-text">웹캠을 켜고 손 제스처를 보여주세요 👋</div>
    </section>

    <section id="control-section">
      <button id="start-btn">웹캠 시작</button>
      <button id="clear-btn">화면 지우기</button>
    </section>

    <section id="result-section">
      <h2>인식된 글자</h2>
      <div id="output-box">_</div>
      <button id="search-btn">검색 실행</button>
    </section>
  </main>

  <footer>
    <p>© 2026 GestureSearch Project by おかだ</p>
  </footer>

  <!-- 향후 JavaScript 테스트용 연결 (예: script.js) -->
  <!-- <script src="script.js"></script> -->
   <script src="script.js"></script>
</body>
</html>
